<html lang="en">

<meta charset="utf-8">

<title>PicoShop -- a PicoScript platform showcase</title>
<style>
  :root { --ink:#e6ebf5; --muted:#8b97ab; --line:#2c313f; --accent:#7c8cff; --bg:#0b0e16; --panel:#11141c; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; margin: 0; color: var(--ink); background: var(--bg); }
  header { background: #070a12; padding: 14px 22px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--line); }
  header h1 { font-size: 18px; margin: 0; }
  header .tag { font-size: 12px; color: var(--muted); }
  header a.home { margin-left: auto; font-size: 12px; color: var(--accent); text-decoration: none; }
  nav { display: flex; gap: 4px; padding: 10px 22px 0; background: var(--panel); border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  nav a { padding: 8px 14px; font-size: 14px; text-decoration: none; color: var(--muted); border-bottom: 2px solid transparent; }
  nav a.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  main { max-width: 1000px; margin: 0 auto; padding: 22px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 16px 18px; margin-bottom: 18px; }
  .card h2 { font-size: 15px; margin: 0 0 4px; }
  .card p.sub { margin: 0 0 12px; color: var(--muted); font-size: 13px; }
  .pill { display: inline-block; font-size: 11px; background: #1b2340; color: var(--accent); padding: 2px 8px; border-radius: 999px; margin-left: 6px; }
  button.bt { background: var(--accent); color: #0b0e16; border: none; border-radius: 6px; padding: 7px 12px; font-size: 13px; cursor: pointer; font-weight: 600; }
  pre { background: #070a12; color: #9fb0c8; padding: 10px; border-radius: 8px; font-size: 12px; overflow: auto; white-space: pre-wrap; }
  table.pico-report { border-collapse: collapse; font-size: 14px; width: 100%; }
  table.pico-report th, table.pico-report td { border: 1px solid var(--line); padding: 5px 12px; text-align: left; }
  table.pico-report thead th { background: #161b2b; }
  table.pico-report tfoot td { font-weight: 700; background: #131829; }
  .pico-form-row { display: flex; gap: 14px; flex-wrap: wrap; margin: 6px 0; }
  .pico-field { display: flex; flex-direction: column; font-size: 12px; color: var(--muted); }
  .pico-field input { border: 1px solid #34405e; border-radius: 5px; padding: 4px 6px; font-size: 14px; background:#0b0e16; color: var(--ink); }
  .log { font-size: 12px; font-family: ui-monospace, monospace; }
  .log div { padding: 3px 0; border-bottom: 1px dashed var(--line); }
  .log .ev { color: var(--accent); font-weight: 600; }
  .muted { color: var(--muted); font-size: 12px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
</style>
</head>

// The VM is a deterministic 32-bit integer machine. Arithmetic/control-flow and

// LOAD, localStorage SAVE, CALL) lower to host-hook calls or annotated comments
// and are reported through the returned `warnings` array.
var BareMetal = (typeof BareMetal !== 'undefined') ? BareMetal : {};
BareMetal.WorkflowPico = (() => {
  'use strict';

  var VERSION = '1.1.0';
  var UNIT = '    ';
  var DEFAULT_ARRAY_BASE = 8192; // 0x2000 — well above workflow scratch/field keys
  var hasOwn = Object.prototype.hasOwnProperty;

  function own(o, k) { return o != null && hasOwn.call(o, k); }
  function pad(n) { var s = ''; for (var i = 0; i < n; i++) s += UNIT; return s; }

  // ── identifiers ────────────────────────────────────────────────────────────
  function sanitizeId(name) {
    var s = String(name == null ? '' : name).replace(/[^A-Za-z0-9_]/g, '_');
    if (!s) s = '_v';
    if (/^[0-9]/.test(s)) s = '_' + s;
    return s;
  }

  // ── expression translation (JS-ish subset → English word operators) ─────────
  var BINARY_WORD = {
    '==': 'is', '===': 'is', '!=': 'is not', '!==': 'is not',
    '>=': 'is at least', '<=': 'is at most',
    '>': 'is greater than', '<': 'is less than',
    '&&': 'and', '||': 'or',
    '+': 'plus', '-': 'minus', '*': 'times', '/': 'divided by', '%': 'modulo'
  };

  function tokenizeExpr(s) {
    var toks = [];
    var i = 0;
    var n = s.length;
    while (i < n) {
      var c = s.charAt(i);
      if (/\s/.test(c)) { i++; continue; }
      if (c === '"' || c === "'") {
        var q = c;
        var j = i + 1;
        var str = c;
        while (j < n) {
          var d = s.charAt(j);
          str += d;
          if (d === '\\' && j + 1 < n) { str += s.charAt(j + 1); j += 2; continue; }
          if (d === q) { j++; break; }
          j++;
        }
        toks.push({ type: 'str', value: str }); i = j; continue;
      }
      if (/[0-9]/.test(c)) {
        var jn = i;
        while (jn < n && /[0-9.]/.test(s.charAt(jn))) jn++;
        toks.push({ type: 'num', value: s.slice(i, jn) }); i = jn; continue;
      }
      if (/[A-Za-z_$]/.test(c)) {
        var ji = i;
        while (ji < n && /[A-Za-z0-9_$]/.test(s.charAt(ji))) ji++;
        toks.push({ type: 'id', value: s.slice(i, ji) }); i = ji; continue;
      }
      var three = s.substr(i, 3);
      if (three === '===' || three === '!==') { toks.push({ type: 'op', value: three }); i += 3; continue; }
      var two = s.substr(i, 2);
      if (two === '==' || two === '!=' || two === '>=' || two === '<=' || two === '&&' || two === '||') {
        toks.push({ type: 'op', value: two }); i += 2; continue;
      }
      if ('+-*/%<>!'.indexOf(c) >= 0) { toks.push({ type: 'op', value: c }); i++; continue; }
      toks.push({ type: 'punct', value: c }); i++;
    }
    return toks;
  }

  function translateExpr(src) {
    var toks = tokenizeExpr(String(src == null ? '' : src));
    var parts = [];
    var prevValue = false;
    for (var i = 0; i < toks.length; i++) {
      var t = toks[i];
      if (t.type === 'op') {
        if ((t.value === '-' || t.value === '+') && !prevValue) {
          if (t.value === '-') { parts.push('0'); parts.push('minus'); } // unary minus
          prevValue = false;
        } else if (t.value === '!' && !prevValue) {
          parts.push('not'); prevValue = false;
        } else {
          parts.push(own(BINARY_WORD, t.value) ? BINARY_WORD[t.value] : t.value);
          prevValue = false;
        }
      } else if (t.type === 'id') {
        parts.push(sanitizeId(t.value)); prevValue = true;
      } else if (t.type === 'num' || t.type === 'str') {
        parts.push(t.value); prevValue = true;
      } else {
        parts.push(t.value);
        prevValue = (t.value === ')');
      }
    }
    return parts.join(' ')
      .replace(/\(\s+/g, '(')
      .replace(/\s+\)/g, ')')
      .replace(/\s+,/g, ',')
      .replace(/\s*\.\s*/g, '.')
      .replace(/\s+/g, ' ')
      .trim();
  }

  // ── literals ────────────────────────────────────────────────────────────────
  function numLit(n) {
    if (typeof n !== 'number' || !isFinite(n)) return '0';
    n = Math.trunc(n);
    return n < 0 ? '(0 minus ' + Math.abs(n) + ')' : String(n);
  }

  function quoteStr(s) {
    return '"' + String(s)
      .replace(/\\/g, '\\\\')
      .replace(/"/g, '\\"')
      .replace(/\n/g, '\\n')
      .replace(/\t/g, '\\t') + '"';
  }

  function emitScalar(value, warnings, label) {
    if (value === null || value === undefined) return '0';
    if (typeof value === 'number') return numLit(value);
    if (typeof value === 'boolean') return value ? 'true' : 'false';
    if (typeof value === 'string') return emitStringValue(value, warnings, label);
    warnings.push(label + ': non-scalar value is not representable on the integer VM; emitted 0');
    return '0';
  }

  function emitStringValue(v, warnings, label) {
    var exact = /^\$\{([\s\S]+)\}$/.exec(v);
    if (exact) return '(' + translateExpr(exact[1]) + ')';
    var trimmed = v.trim();
    if (/^-?\d+$/.test(trimmed)) return numLit(parseInt(trimmed, 10));
    if (/\$\{[\s\S]*\}/.test(v)) {
      warnings.push(label + ': string interpolation ' + JSON.stringify(v) + ' is not representable; emitted quoted literal');
    }
    return quoteStr(v);
  }

  function emitOperand(value, warnings, label) {
    if (typeof value === 'number') return numLit(value);
    if (typeof value === 'string') {
      var t = value.trim();
      if (/^-?\d+$/.test(t)) return numLit(parseInt(t, 10));
      return translateExpr(value);
    }
    return emitScalar(value, warnings, label);
  }

  function literalArray(v) {
    if (Array.isArray(v)) return v;
    if (typeof v === 'string') {
      var t = v.trim();
      if (t.charAt(0) === '[') { try { var a = JSON.parse(t); if (Array.isArray(a)) return a; } catch (_) {} }
    }
    return null;
  }

  // ── array allocation ─────────────────────────────────────────────────────────
  function allocArray(ctx, len) {
    var base = ctx.memNext;
    ctx.memNext += Math.max(1, len);
    return base;
  }

  // Materialise an array literal into consecutive Memory cells; returns {base,len}.
  function materializeArray(ctx, indent, values, label) {
    var base = allocArray(ctx, values.length);
    for (var k = 0; k < values.length; k++) {
      ctx.out.push(pad(indent) + 'Memory.Set(' + (base + k) + ', ' + emitScalar(values[k], ctx.warnings, label + '[' + k + ']') + ').');
    }
    return { base: base, len: values.length };
  }

  // ── recursive lowering ──────────────────────────────────────────────────────
  function emitSeq(steps, pos, indent, ctx) {
    while (pos.i < steps.length) {
      var step = steps[pos.i] || {};
      var type = String(step.type || '').toUpperCase();
      if (type === 'END') { pos.i++; return 'END'; }
      if (type === 'ELSE') return 'ELSE';
      var si = pos.i;                    // flat index of this step (maps back to a designer box)
      var startLine = ctx.out.length;
      pos.i++;
      emitStep(step, type, steps, pos, indent, ctx);
      // Tag every line this step produced with its index; nested children were
      // tagged first during recursion, so only the block's own lines fill here.
      for (var L = startLine; L < ctx.out.length; L++) { if (ctx.lineStep[L] == null) ctx.lineStep[L] = si; }
    }
    return 'EOF';
  }

  function emitBody(steps, pos, indent, ctx) {
    var start = ctx.out.length;
    var term = emitSeq(steps, pos, indent, ctx);
    if (ctx.out.length === start) ctx.out.push(pad(indent) + 'Set _nop to 0.');
    return term;
  }

  function closeLoop(steps, pos, indent, ctx) {
    var term = emitBody(steps, pos, indent + 1, ctx);
    if (term === 'ELSE') { pos.i++; ctx.warnings.push('ELSE without a matching IF; ignored'); }
  }

  // Emit statements belonging to a SWITCH case, stopping (without consuming) at the
  // next CASE / DEFAULT / END marker.
  function emitCaseBody(steps, pos, indent, ctx) {
    while (pos.i < steps.length) {
      var t = String((steps[pos.i] || {}).type || '').toUpperCase();
      if (t === 'CASE' || t === 'DEFAULT' || t === 'END') return;
      var st = steps[pos.i]; pos.i++;
      emitStep(st, t, steps, pos, indent, ctx);
    }
  }

  function emitStep(step, type, steps, pos, indent, ctx) {
    var out = ctx.out;
    var warnings = ctx.warnings;
    var line;
    switch (type) {
      case 'SET':
        emitSet(step, indent, ctx);
        break;

      case 'IF':
        out.push(pad(indent) + 'If ' + translateExpr(step.condition || 'false') + ':');
        var term = emitBody(steps, pos, indent + 1, ctx);
        if (term === 'ELSE') {
          pos.i++;
          out.push(pad(indent) + 'Otherwise:');
          term = emitBody(steps, pos, indent + 1, ctx);
        }
        if (term === 'ELSE') { pos.i++; warnings.push('IF: multiple ELSE branches; extra ELSE ignored'); }
        break;

      case 'FOR':
        var v = sanitizeId(step.var || 'i');
        line = pad(indent) + 'For each ' + v +
          ' from ' + emitOperand(step.from, warnings, 'FOR from') +
          ' to ' + emitOperand(step.to, warnings, 'FOR to');
        if (step.step != null) line += ' by ' + emitOperand(step.step, warnings, 'FOR step');
        out.push(line + ':');
        closeLoop(steps, pos, indent, ctx);
        break;

      case 'FOREACH':
      case 'FOREACHP':
        emitForeach(step, type, steps, pos, indent, ctx);
        break;

      case 'LOG':
        emitLog(step, indent, ctx);
        break;

      case 'WAIT':
        out.push(pad(indent) + 'Timer.After(' + emitOperand(step.ms == null ? 0 : step.ms, warnings, 'WAIT ms') + ').');
        warnings.push('WAIT: Timer.After schedules but does not block the VM');
        break;

      case 'RAISE':
      case 'EMIT':
        if (step.schema && Array.isArray(step.schema.fields) && step.schema.fields.length) {
          emitRaiseTyped(step, indent, ctx);
          break;
        }
        var ev = emitOperand(step.event == null ? 0 : step.event, warnings, 'RAISE event');
        var tgt = step.target != null ? emitOperand(step.target, warnings, 'RAISE target') : '0';
        var call = 'Event.Post(' + ev + ', ' + tgt + ')';
        if (step.result) out.push(pad(indent) + 'Set ' + sanitizeId(step.result) + ' to ' + call + '.');
        else out.push(pad(indent) + call + '.');
        break;

      case 'ON':
      case 'SUBSCRIBE':
        emitOn(step, steps, pos, indent, ctx);
        break;

      case 'LOAD':
        emitLoad(step, indent, ctx);
        break;

      case 'SAVE':
        emitSave(step, indent, ctx);
        break;

      case 'WEB':
        emitWeb(step, indent, ctx);
        break;

      case 'RESPOND':
        emitRespond(step, indent, ctx);
        break;

      case 'WHILE':
        out.push(pad(indent) + 'While ' + translateExpr(step.condition || 'false') + ':');
        closeLoop(steps, pos, indent, ctx);
        break;

      case 'DO': {
        out.push(pad(indent) + 'Repeat:');
        while (pos.i < steps.length && String((steps[pos.i] || {}).type || '').toUpperCase() !== 'LOOP') {
          var dst = steps[pos.i]; pos.i++;
          emitStep(dst, String(dst.type || '').toUpperCase(), steps, pos, indent + 1, ctx);
        }
        var loopStep = steps[pos.i]; if (loopStep) pos.i++;
        var kw = (loopStep && loopStep.until) ? 'Until ' : 'While ';
        out.push(pad(indent) + kw + translateExpr((loopStep && loopStep.condition) || 'true') + '.');
        break;
      }

      case 'SWITCH':
      case 'DISPATCH':
        out.push(pad(indent) + 'Choose ' + translateExpr(step.expr == null ? '0' : step.expr) + ':');
        while (pos.i < steps.length) {
          var ct = String((steps[pos.i] || {}).type || '').toUpperCase();
          if (ct === 'END') { pos.i++; break; }
          if (ct === 'CASE') { var cv = steps[pos.i].value; pos.i++; out.push(pad(indent + 1) + 'When ' + translateExpr(cv == null ? '0' : cv) + ':'); emitCaseBody(steps, pos, indent + 2, ctx); }
          else if (ct === 'DEFAULT') { pos.i++; out.push(pad(indent + 1) + 'Otherwise:'); emitCaseBody(steps, pos, indent + 2, ctx); }
          else { pos.i++; warnings.push('unexpected ' + ct + ' inside SWITCH; ignored'); }
        }
        break;

      case 'BREAK':
        out.push(pad(indent) + 'Stop.');
        break;

      case 'SKIP':
      case 'CONTINUE':
        out.push(pad(indent) + 'Skip.');
        break;

      case 'RETURN':
        out.push(pad(indent) + 'Return' + (step.value != null && step.value !== '' ? ' ' + translateExpr(step.value) : '') + '.');
        break;

      case 'GOTO':
        out.push(pad(indent) + 'Go to ' + sanitizeId(step.label || 'L') + '.');
        break;

      case 'LABEL':
        out.push(pad(indent) + 'Label ' + sanitizeId(step.name || 'L') + '.');
        break;

      case 'GOSUB':
        out.push(pad(indent) + 'Call ' + sanitizeId(step.name || '') + '(' + (Array.isArray(step.args) ? step.args.map(function (a) { return translateExpr(a); }).join(', ') : '') + ').');
        break;

      case 'CALLNS':
        // A generic namespace call (e.g. Net.Status(200)) carried verbatim in English.
        out.push(pad(indent) + String(step.call || '').replace(/\.\s*$/, '') + '.');
        break;

      case 'RAW':
        // Escape hatch: emit the carried English lines verbatim (full-fidelity round-trip).
        String(step.code == null ? '' : step.code).split('\n').forEach(function (ln) { out.push(pad(indent) + ln); });
        break;

      case 'CALL':
        out.push(pad(indent) + '# CALL ' + (step.workflow || ''));
        warnings.push('CALL: nested workflow ' + JSON.stringify(step.workflow || '') + ' must be compiled separately and is not linked');
        break;

      case 'ELSE':
        pos.i++;
        warnings.push('ELSE without a matching IF; ignored');
        break;

      default:
        out.push(pad(indent) + '# ' + type + ' (unsupported step type)');
        warnings.push('Unsupported step type ' + JSON.stringify(type) + '; emitted as comment');
    }
  }

  function emitSet(step, indent, ctx) {
    var name = sanitizeId(step.name);
    if (own(step, 'expr')) {
      ctx.out.push(pad(indent) + 'Set ' + name + ' to ' + translateExpr(step.expr) + '.');
      delete ctx.arrays[name];
      return;
    }
    var arr = literalArray(step.value);
    if (arr) {
      var info = materializeArray(ctx, indent, arr, 'SET ' + step.name);
      ctx.arrays[name] = info;
      ctx.out.push(pad(indent) + 'Set ' + name + ' to ' + info.base + '.');
      ctx.out.push(pad(indent) + 'Set ' + name + '_len to ' + numLit(info.len) + '.');
      return;
    }
    delete ctx.arrays[name];
    ctx.out.push(pad(indent) + 'Set ' + name + ' to ' + emitScalar(step.value, ctx.warnings, 'SET ' + step.name) + '.');
  }

  function resolveArray(step, indent, ctx, label) {
    var inRaw = step.in;
    if (typeof inRaw === 'string') {
      var key = sanitizeId(inRaw.trim());
      if (own(ctx.arrays, key)) return ctx.arrays[key];
    }
    var lit = literalArray(inRaw);
    if (lit) return materializeArray(ctx, indent, lit, label);
    return null;
  }

  // ON/SUBSCRIBE <event>: drain the Event.* queue, running the handler body for
  // each matching event (bounded by the pending count).
  // Event schemas ({mode:'sync'|'async', fields:[{name,type}], returns}) give
  // RAISE ("program exit") and ON ("event handler") steps a fixed, typed
  // payload without any new VM hooks: the payload is a Map serialised through
  // the existing PSC1 card codec (Binary.SerializeCard/ParseCard) and carried
  // as raw bytes on the event record via Event.SetData/Event.Data. `mode` is
  // designer-level metadata (sync exits vs async handlers use identical
  // plumbing on this single-threaded, queue-based Event.* primitive).
  function isStrFieldType(t) { return t === 'str' || t === 'utf8' || t === 'latin1' || t === 'blob'; }

  function emitRaiseTyped(step, indent, ctx) {
    var out = ctx.out, p = pad(indent), warnings = ctx.warnings;
    var ev = emitOperand(step.event == null ? 0 : step.event, warnings, 'RAISE event');
    var tgt = step.target != null ? emitOperand(step.target, warnings, 'RAISE target') : '0';
    out.push(p + 'Map.New().');
    var args = step.args || {};
    step.schema.fields.forEach(function (f) {
      var val = args[f.name];
      if (val === undefined || val === null) {
        warnings.push('RAISE: missing arg for schema field "' + f.name + '"; omitted from payload');
        return;
      }
      if (isStrFieldType(f.type)) out.push(p + 'Map.PutSS(' + strLit(f.name) + ', ' + emitStringValue(String(val), warnings, 'RAISE field ' + f.name) + ').');
      else out.push(p + 'Map.PutSI(' + strLit(f.name) + ', ' + emitOperand(val, warnings, 'RAISE field ' + f.name) + ').');
    });
    var body = '_evbody' + (ctx.tempN++);
    out.push(p + 'Set ' + body + ' to Binary.SerializeCard().');
    var resultVar = step.result ? sanitizeId(step.result) : ('_evid' + (ctx.tempN++));
    out.push(p + 'Set ' + resultVar + ' to Event.Post(' + ev + ', ' + tgt + ').');
    out.push(p + 'Event.SetData(' + resultVar + ', ' + body + ').');
  }

  function emitOn(step, steps, pos, indent, ctx) {
    var ev = emitOperand(step.event == null ? 0 : step.event, ctx.warnings, 'ON event');
    var v = sanitizeId(step.var || 'event');
    var loop = '_on' + (ctx.tempN++);
    var evid = '_ev' + (ctx.tempN++);
    ctx.out.push(pad(indent) + 'For each ' + loop + ' from 0 to (Event.Count() minus 1):');
    ctx.out.push(pad(indent + 1) + 'Set ' + evid + ' to Event.Next().');
    ctx.out.push(pad(indent + 1) + 'If Event.Type(' + evid + ') is ' + ev + ':');
    ctx.out.push(pad(indent + 2) + 'Set ' + v + ' to ' + evid + '.');
    if (step.schema && Array.isArray(step.schema.fields) && step.schema.fields.length) {
      var body = '_evbody' + (ctx.tempN++);
      ctx.out.push(pad(indent + 2) + 'Set ' + body + ' to Event.Data(' + evid + ').');
      ctx.out.push(pad(indent + 2) + 'Binary.ParseCard(' + body + ').');
      step.schema.fields.forEach(function (f) {
        var fv = sanitizeId(f.name);
        if (isStrFieldType(f.type)) ctx.out.push(pad(indent + 2) + 'Set ' + fv + ' to Map.GetSS(' + strLit(f.name) + ').');
        else ctx.out.push(pad(indent + 2) + 'Set ' + fv + ' to Map.GetSI(' + strLit(f.name) + ').');
      });
    }
    var start = ctx.out.length;
    var term = emitSeq(steps, pos, indent + 2, ctx);
    if (ctx.out.length === start) ctx.out.push(pad(indent + 2) + 'Set _nop to 0.');
    if (term === 'ELSE') { pos.i++; ctx.warnings.push('ELSE without a matching IF; ignored'); }
  }

  function emitForeach(step, type, steps, pos, indent, ctx) {
    var v = sanitizeId(step.var || 'item');
    if (type === 'FOREACHP') ctx.warnings.push('FOREACHP: parallel iteration lowered to sequential');
    var info = resolveArray(step, indent, ctx, 'FOREACH ' + (step.var || 'item'));
    if (info) {
      var idx = '_fe' + (ctx.tempN++);
      ctx.out.push(pad(indent) + 'For each ' + idx + ' from 0 to ' + numLit(info.len - 1) + ':');
      ctx.out.push(pad(indent + 1) + 'Set ' + v + ' to Memory.Get(' + info.base + ' plus ' + idx + ').');
      var start = ctx.out.length;
      var term = emitSeq(steps, pos, indent + 1, ctx);
      if (ctx.out.length === start) ctx.out.push(pad(indent + 1) + 'Set _nop to 0.');
      if (term === 'ELSE') { pos.i++; ctx.warnings.push('ELSE without a matching IF; ignored'); }
      return;
    }
    ctx.out.push(pad(indent) + '# FOREACH ' + v + ' in ' + (step.in || '') + ' — runtime array not resolvable; body runs once with ' + v + ' = 0');
    ctx.out.push(pad(indent) + 'For each ' + v + ' from 0 to 0:');
    ctx.warnings.push('FOREACH over ' + JSON.stringify(step.in || '') + ' is not representable on the integer VM; body lowered to a single iteration');
    closeLoop(steps, pos, indent, ctx);
  }

  // LOAD name from <source>. `variable` clones another context value (a plain
  // assignment, array-aware); `memory`/`scratch` read a Memory/Context cell.
  // Inbound HTTP request descriptor fields, as written by the kernel / WebIDE
  // HTTP simulator into the low PicoWAL cards (0,0,K). Reading them lets a served
  // workflow branch on method/length/body before it RESPONDs. See docs/MAP.md and
  // the "HTTP responder" showcase.
  var REQ_FIELDS = { length: 0, method: 1, bodylen: 2, sum: 3, pathlen: 4, querylen: 5 };
  function emitLoad(step, indent, ctx) {
    var name = sanitizeId(step.name);
    var from = String(step.from || '').toLowerCase();
    if (from === 'request') {
      var fld = String(step.field || step.key || 'method').toLowerCase();
      var k = own(REQ_FIELDS, fld) ? REQ_FIELDS[fld] : null;
      if (k == null) {
        ctx.out.push(pad(indent) + '# LOAD ' + (step.name || '') + ' <- request.' + fld + ' (unknown field)');
        ctx.warnings.push('LOAD from request: unknown field ' + JSON.stringify(fld) + ' (use method/length/bodylen/pathlen/querylen/sum)');
        return;
      }
      ctx.out.push(pad(indent) + 'Set ' + name + ' to 0.');
      ctx.out.push(pad(indent) + 'Storage.Load(0, 0, ' + k + ', ' + name + ').');
      delete ctx.arrays[name];
      return;
    }
    if (from === 'variable') {
      var srcRaw = step.key || step.var || step.source || '';
      var srcId = sanitizeId(String(srcRaw).trim());
      if (own(ctx.arrays, srcId)) ctx.arrays[name] = ctx.arrays[srcId];
      else delete ctx.arrays[name];
      ctx.out.push(pad(indent) + 'Set ' + name + ' to ' + translateExpr(String(srcRaw)) + '.');
      return;
    }
    if (from === 'memory' || from === 'scratch') {
      var hook = from === 'scratch' ? 'Context.GetScratchValue' : 'Memory.Get';
      ctx.out.push(pad(indent) + 'Set ' + name + ' to ' + hook + '(' + emitOperand(step.key == null ? 0 : step.key, ctx.warnings, 'LOAD key') + ').');
      delete ctx.arrays[name];
      return;
    }
    ctx.out.push(pad(indent) + '# LOAD ' + (step.name || '') + ' <- ' + (step.from || '') + (step.key ? ' [' + step.key + ']' : ''));
    ctx.warnings.push('LOAD from ' + JSON.stringify(step.from || '') + ' requires a host storage/transport hook and is not executed by the integer VM');
  }

  // SAVE name to <target>. `variable` copies into another context key; `memory`/
  // `scratch` write a Memory/Context cell.
  function emitSave(step, indent, ctx) {
    var name = sanitizeId(step.name);
    var to = String(step.to || '').toLowerCase();
    if (to === 'variable') {
      var target = sanitizeId(step.key || step.target || step.name);
      ctx.out.push(pad(indent) + 'Set ' + target + ' to ' + name + '.');

      ['report', 'form'].forEach(function (m) { var o = document.createElement('option'); o.value = o.textContent = m; if ((template.mode || 'report') === m) o.selected = true; modeSel.appendChild(o); });
      modeSel.onchange = function () { template.mode = modeSel.value; refresh(); };
      var addCol = document.createElement('button'); addCol.className = 'bt'; addCol.textContent = '+ Column';
      addCol.onclick = function () { (template.columns = template.columns || []).push({ label: 'Col', field: template.columns.length, width: 6, format: 'int', editable: true }); refresh(); };
      var addAgg = document.createElement('button'); addAgg.className = 'bt'; addAgg.textContent = '+ Aggregate';
      addAgg.onclick = function () { (template.aggregates = template.aggregates || []).push({ column: 0, fn: 'sum' }); refresh(); };
      var exp = document.createElement('button'); exp.className = 'bt'; exp.textContent = 'Export';
      exp.onclick = function () { var j = JSON.stringify(template, null, 2); if (typeof window !== 'undefined' && window.prompt) window.prompt('Report template', j); emit(root, 'bm:report-export', { template: JSON.parse(j), json: j }); };
      var dataIn = document.createElement('input');
      dataIn.className = 'bt'; dataIn.value = data.join(', '); dataIn.placeholder = 'data (ints)';
      dataIn.oninput = function () { data = parseData(dataIn.value); scheduleRefresh(); };
      bar.appendChild(title); bar.appendChild(modeSel); bar.appendChild(addCol); bar.appendChild(addAgg); bar.appendChild(exp); bar.appendChild(dataIn);

      // stage-1 data-source picker: choose where the report data comes from.
      var srcSel = document.createElement('select');
      srcSel.className = 'bt'; srcSel.title = 'stage-1 data source';
      [['literal', 'literal'], ['rest', 'REST'], ['workflow', 'workflow'], ['pico', 'PicoScript']].forEach(function (o) {
        var opt = document.createElement('option'); opt.value = o[0]; opt.textContent = o[1];
        if ((source.kind || 'literal') === o[0]) opt.selected = true; srcSel.appendChild(opt);
      });
      var srcCfg = document.createElement('input');
      srcCfg.className = 'bt'; applyStyle(srcCfg, { minWidth: '160px' });
      function cfgPlaceholder() {
        var k = srcSel.value;
        srcCfg.placeholder = k === 'rest' ? 'url' : k === 'workflow' ? 'steps JSON' : k === 'pico' ? 'English source' : '(uses data box)';
        srcCfg.value = source.url || (source.steps ? JSON.stringify(source.steps) : '') || source.source || '';
      }
      srcSel.onchange = function () { source = { kind: srcSel.value }; cfgPlaceholder(); };
      srcCfg.oninput = function () {
        var k = srcSel.value;
        if (k === 'rest') source = { kind: 'rest', url: srcCfg.value };
        else if (k === 'workflow') { try { source = { kind: 'workflow', steps: JSON.parse(srcCfg.value) }; } catch (e) { source = { kind: 'workflow', steps: [] }; } }
        else if (k === 'pico') source = { kind: 'pico', source: srcCfg.value, lang: 'english' };
      };
      var loadBtn = document.createElement('button');
      loadBtn.className = 'bt'; loadBtn.textContent = 'Load';
      loadBtn.onclick = function () {
        loadData(source, opts).then(function (rows) {
          data = rows; refresh();
          emit(root, 'bm:report-data', { source: source, data: rows.slice() });
        }, function (err) {
          emit(root, 'bm:report-error', { source: source, error: err });
        });
      };
      cfgPlaceholder();
      bar.appendChild(srcSel); bar.appendChild(srcCfg); bar.appendChild(loadBtn);
    }

    function renderColumns() {
      body.innerHTML = '';
      (template.columns || []).forEach(function (c, idx) {
        var row = document.createElement('div');
        row.className = 'bm-report-col rw';
        applyStyle(row, { display: 'flex', gap: '6px', alignItems: 'center', margin: '3px 0' });
        var label = document.createElement('input'); label.className = 'bt'; label.value = c.label || ''; label.placeholder = 'label';
        label.oninput = function () { c.label = label.value; scheduleRefresh(); };
        var field = document.createElement('input'); field.className = 'bt'; field.type = 'number'; field.value = (typeof c.field === 'number' ? c.field : idx); field.title = 'field index'; applyStyle(field, { width: '56px' });
        field.oninput = function () { c.field = parseInt(field.value, 10) || 0; scheduleRefresh(); };
        var width = document.createElement('input'); width.className = 'bt'; width.type = 'number'; width.value = c.width || 6; width.title = 'width'; applyStyle(width, { width: '56px' });
        width.oninput = function () { c.width = parseInt(width.value, 10) || 6; scheduleRefresh(); };
        var fmtSel = document.createElement('select'); fmtSel.className = 'bt';
        FORMATS.forEach(function (f) { var o = document.createElement('option'); o.value = o.textContent = f; if ((c.format || 'int') === f) o.selected = true; fmtSel.appendChild(o); });
        fmtSel.onchange = function () { c.format = fmtSel.value; refresh(); };
        var edit = document.createElement('label'); edit.style.fontSize = '12px';
        var ecb = document.createElement('input'); ecb.type = 'checkbox'; ecb.checked = c.editable !== false;
        ecb.onchange = function () { c.editable = ecb.checked; refresh(); };
        edit.appendChild(ecb); edit.appendChild(document.createTextNode(' editable'));
        var del = document.createElement('button'); del.className = 'bt'; del.textContent = '\u00d7';
        del.onclick = function () { template.columns.splice(idx, 1); refresh(); };
        row.appendChild(label); row.appendChild(field); row.appendChild(width); row.appendChild(fmtSel); row.appendChild(edit); row.appendChild(del);
        body.appendChild(row);
      });
      (template.aggregates || []).forEach(function (a, idx) {
        var row = document.createElement('div');
        row.className = 'bm-report-agg rw';
        applyStyle(row, { display: 'flex', gap: '6px', alignItems: 'center', margin: '3px 0' });
        var span = document.createElement('span'); span.textContent = 'agg'; span.style.fontSize = '12px';
        var colIn = document.createElement('input'); colIn.className = 'bt'; colIn.type = 'number'; colIn.value = a.column || 0; colIn.title = 'column'; applyStyle(colIn, { width: '56px' });
        colIn.oninput = function () { a.column = parseInt(colIn.value, 10) || 0; scheduleRefresh(); };
        var fnSel = document.createElement('select'); fnSel.className = 'bt';
        VALID_AGG.forEach(function (f) { var o = document.createElement('option'); o.value = o.textContent = f; if ((a.fn || 'sum') === f) o.selected = true; fnSel.appendChild(o); });
        fnSel.onchange = function () { a.fn = fnSel.value; refresh(); };
        var del = document.createElement('button'); del.className = 'bt'; del.textContent = '\u00d7';
        del.onclick = function () { template.aggregates.splice(idx, 1); refresh(); };
        row.appendChild(span); row.appendChild(colIn); row.appendChild(fnSel); row.appendChild(del);
        body.appendChild(row);
      });
    }

    var pending = null;
    function scheduleRefresh() {
      var mode = template.mode || 'report';
      preview.innerHTML = renderHtml(data, template, mode);
      text.textContent = renderText(data, template);
      emit(root, 'bm:report-change', { template: JSON.parse(JSON.stringify(template)), mode: mode });
    }

    refresh();
    return {
      element: root,
      getTemplate: function () { return JSON.parse(JSON.stringify(template)); },
      setTemplate: function (t) { template = (typeof t === 'string') ? JSON.parse(t) : t; refresh(); return this; },
      getData: function () { return data.slice(); },
      setData: function (d) { data = Array.isArray(d) ? d.slice() : parseData(d); refresh(); return this; },
      getSource: function () { return JSON.parse(JSON.stringify(source)); },
      setSource: function (s) { source = s || { kind: 'literal' }; renderBar(); return this; },
      load: function () { return loadData(source, opts).then(function (rows) { data = rows; refresh(); return rows.slice(); }); },
      refresh: refresh,
      destroy: function () { if (root.parentNode) root.parentNode.removeChild(root); }
    };
  }

  return {
    VERSION: '1.0.0',
    renderText: renderText,
    renderHtml: renderHtml,
    render: render,
    collect: collect,
    flatten: flatten,
    toWrites: toWrites,
    loadData: loadData,
    designer: designer
  };
})();
if (typeof module !== 'undefined' && module.exports) module.exports = BareMetal.Report;
</script>
<script>
(function () {
  'use strict';
  var WF = BareMetal.WorkflowPico, L = BareMetal.Report;   // vendored from BareMetalJsTools

  // Stage 1: an "orders" workflow that materialises line items [qty, price] and
  // emits them -- the data producer (the logic layer).
  var ordersFlow = [
    { type: 'SET', name: 'lines', value: [2, 10, 3, 20, 1, 50] },
    { type: 'FOREACH', var: 'v', in: 'lines' },
    { type: 'LOG', message: 'v' },
    { type: 'END' }
  ];
  // Stage 2: the report/form layout template.
  var template = {
    title: 'Orders', mode: 'report',
    columns: [
      { label: 'Qty', field: 0, width: 6, format: 'int', editable: true },
      { label: 'Price', field: 1, width: 7, format: 'int', editable: true }
    ],
    aggregates: [{ column: 0, fn: 'sum' }, { column: 1, fn: 'sum' }]
  };
  var orderData = [2, 10, 3, 20, 1, 50];
  var activity = [];

  // A tiny in-page event bus (the same RAISE/ON idea, minimal + dependency-free).
  var subs = [];
  var Bus = {
    on: function (fn) { subs.push(fn); },
    emit: function (topic, data) {
      activity.unshift({ ev: topic, msg: typeof data === 'object' ? JSON.stringify(data) : String(data), t: new Date().toLocaleTimeString() });
      subs.forEach(function (fn) { try { fn(topic, data); } catch (e) {} });
    }
  };

  var view = document.getElementById('view');
  function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  // VM output buffer -> ints (Print writes 4-byte big-endian ints).
  function decodeInts(output) {
    var bytes = [];
    (output || []).forEach(function (c) {
      if (Array.isArray(c) || (typeof Uint8Array !== 'undefined' && c instanceof Uint8Array)) { for (var i = 0; i < c.length; i++) bytes.push(c[i] & 255); }
      else bytes.push(c & 255);
    });
    var out = [];
    for (var j = 0; j + 4 <= bytes.length; j += 4) out.push(((bytes[j] << 24) | (bytes[j + 1] << 16) | (bytes[j + 2] << 8) | bytes[j + 3]) | 0);
    return out;
  }

  function runFlow() {
    var eng = WF.compile(ordersFlow);
    var r = PicoCompile.compileDebug(eng.source, 'english');
    var vm = new PicoVM(); vm.run(r.words.map(function (w) { return w >>> 0; }));
    return { source: eng.source, words: r.words, output: vm.outputInts ? vm.outputInts() : decodeInts(vm.output), warnings: eng.warnings };
  }

  function viewBuild() {
    view.innerHTML =
      '<div class="card"><h2>The data producer is a <b>visual workflow</b> <span class="pill">picoworkflow</span></h2>' +
      '<p class="sub">These steps materialise the order lines into PicoScript <code>Memory</code> and emit each value. ' +
      '<b>Compile</b> turns them into deterministic bytecode that runs on the same VM as bare metal, PIOS and the C# host.</p>' +
      '<pre>' + esc(JSON.stringify(ordersFlow, null, 2)) + '</pre>' +
      '<div class="row"><button class="bt" id="compile">Compile &amp; Run &#9654;</button>' +
      '<span class="muted">Workflow &rarr; English PicoScript &rarr; bytecode &rarr; VM output</span></div>' +
      '<div id="out"></div></div>';
    document.getElementById('compile').onclick = function () {
      var res;
      try { res = runFlow(); } catch (e) { document.getElementById('out').innerHTML = '<pre style="color:#f88">' + esc(e.message) + '</pre>'; return; }
      orderData = res.output;
      document.getElementById('out').innerHTML =
        '<h2 style="margin-top:14px">Generated PicoScript (English dialect)</h2><pre>' + esc(res.source) + '</pre>' +
        '<h2>VM output (the order data)</h2><pre>[' + orderData.join(', ') + ']</pre>';
      Bus.emit('flow.compiled', { words: res.words.length, values: orderData.length });
    };
  }

  function viewReport() {
    var html = L.renderHtml(orderData, template, 'report');
    view.innerHTML =
      '<div class="card"><h2>Render a <b>report</b> over the workflow output <span class="pill">picolayout</span></h2>' +
      '<p class="sub">The same template renders a read-only table with an aggregate footer. Byte-identical to the ' +
      'in-browser and native toolchain engines.</p>' + html + '</div>';
    Bus.emit('report.rendered', { rows: Math.ceil(orderData.length / template.columns.length) });
  }

  function viewForm() {
    view.innerHTML =
      '<div class="card"><h2>Edit an order as a <b>form</b> <span class="pill">read-write layout</span></h2>' +
      '<p class="sub">The exact same template, rendered read-write. <b>Save</b> collects the inputs and maps them ' +
      'back through the data ABI.</p>' +
      '<div id="formHost">' + L.renderHtml(orderData, template, 'form') + '</div>' +
      '<div class="row" style="margin-top:12px"><button class="bt" id="save">Save order &#128190;</button>' +
      '<span class="muted" id="savemsg"></span></div></div>';
    document.getElementById('save').onclick = function () {
      var rows = L.collect(document.querySelector('#formHost form'));
      orderData = L.flatten(rows);
      var writes = L.toWrites(rows, { base: 0 });
      document.getElementById('savemsg').textContent = 'saved ' + rows.length + ' rows \u2192 data ABI: ' + JSON.stringify(writes);
      Bus.emit('order.saved', { rows: rows.length, total: orderData.reduce(function (a, b) { return a + b; }, 0) });
    };
  }

  function viewActivity() {
    view.innerHTML =
      '<div class="card"><h2>Everything is wired with <b>events</b> <span class="pill">RAISE / ON</span></h2>' +
      '<p class="sub">Compiling, rendering and saving all publish to one bus &mdash; the same event model workflows ' +
      'RAISE/ON. This log is a live subscriber.</p><div class="log" id="log"></div></div>';
    renderLog();
  }
  function renderLog() {
    var el = document.getElementById('log');
    if (!el) return;
    el.innerHTML = activity.length
      ? activity.map(function (a) { return '<div><span class="ev">' + esc(a.ev) + '</span> &middot; ' + esc(a.msg) + ' <span class="muted">' + a.t + '</span></div>'; }).join('')
      : '<div class="muted">No activity yet &mdash; compile the workflow, view the report, or save the form.</div>';
  }
  Bus.on(function () { renderLog(); });

  var routes = { '/build': viewBuild, '/report': viewReport, '/form': viewForm, '/activity': viewActivity };
  function route() {
    var hash = (location.hash || '#/build').slice(1);
    (routes[hash] || viewBuild)();
    document.querySelectorAll('#nav a').forEach(function (a) { a.classList.toggle('active', a.getAttribute('href') === (location.hash || '#/build')); });
  }
  window.addEventListener('hashchange', route);
  if (!location.hash) location.hash = '#/build';
  route();
})();
</script>
</body>
</html>
